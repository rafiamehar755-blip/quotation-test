<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Aluminium & Glass - Quotation System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; min-height: 100vh; }

  .app-header { background: #ffffff; padding: 20px 30px; display:flex; align-items:center; gap:15px; border-bottom: 2px solid #cccccc; }
  .app-header h1 { font-size: 22px; color: #666666; }
  .app-header span { color: #999999; font-size: 13px; }

  .container { display: grid; grid-template-columns: 410px 1fr; gap: 0; height: calc(100vh - 70px); }

  .form-panel { background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; }
  .form-panel h2 { color: #e74c3c; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0f3460; border: 1px solid #1a4a80; color: #eee; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #e74c3c; }

  .items-section { margin-top: 10px; }
  .item-row { background: #0a1628; border: 1px solid #1a4a80; border-radius: 6px; padding: 12px; margin-bottom: 10px; position: relative; }
  .item-row h4 { color: #e74c3c; font-size: 12px; margin-bottom: 8px; }
  .item-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .item-grid .full { grid-column: 1/-1; }
  .item-grid input, .item-grid select { width:100%; background:#16213e; border:1px solid #1a4a80; color:#eee; padding:6px 8px; border-radius:4px; font-size:12px; }
  
  /* Multi-size sub-grid inside the form items */
  .sizes-container { background: #0f3460; padding: 8px; border-radius: 4px; margin-top: 4px; }
  .sizes-title { font-size: 10px; color: #ffb4a2; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
  .size-row { display: grid; grid-template-columns: 20px 1fr 15px 1fr 25px 1fr; align-items: center; gap: 4px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
  .size-row input { text-align: center; padding: 4px 2px !important; }

  .calc-result { background: #0f3460; padding: 6px 8px; border-radius: 4px; font-size: 11px; color: #4ecca3; margin-top: 6px; line-height: 1.4; }

  .btn-add { width:100%; background: #0f3460; border: 1px dashed #e74c3c; color: #e74c3c; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 5px; }
  .btn-add:hover { background: #e74c3c; color: white; }
  .btn-glass-room { width:100%; background: linear-gradient(135deg, #16a085, #1abc9c); color:white; border:none; padding: 9px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 8px; font-weight: bold; }
  .btn-glass-room:hover { background: linear-gradient(135deg, #1abc9c, #16a085); }
  .btn-remove { position:absolute; top:8px; right:8px; background:#e74c3c; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; font-size:11px; }

  .btn-generate { width:100%; background: linear-gradient(135deg, #e74c3c, #c0392b); color:white; border:none; padding: 12px; border-radius:6px; cursor:pointer; font-size:15px; font-weight:bold; margin-top:15px; }
  .btn-generate:hover { background: linear-gradient(135deg, #c0392b, #962d22); }

  .preview-panel { background: #ffffff; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; border-left: 1px solid #ddd; }
  .preview-toolbar { width: 100%; max-width: 820px; display: flex; gap: 10px; margin-bottom: 15px; }
  .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-print { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }

  /* QUOTATION DOC PAGES */
  .quotation-page { background: white; width: 820px; height: 1120px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); font-family: Arial, sans-serif; color: #222; position: relative; margin-bottom: 25px; box-sizing: border-box; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 15px; position: relative; z-index: 1; }
  table th { background: #c0392b; color: white; padding: 10px 8px; text-align: left; }
  table th:last-child { text-align: right; }
  table td { padding: 8px 10px; border: 1px solid #ddd; vertical-align: top; }
  table tr:nth-child(even) td { background: #fdf5f5; }
  .total-row td { font-weight: bold; background: #fdf5f5 !important; border-top: 2px solid #c0392b; }
  .total-row td:last-child { color: #c0392b; font-size: 14px; text-align: right; }

  /* Item name bold, description below */
  .item-name { font-weight: bold; font-size: 12px; color: #111; display: block; margin-bottom: 4px; }
  .item-desc { font-size: 11.5px; color: #444; line-height: 1.5; display: block; }

  .amount-words { background: #fdf5f5; border: 1px solid #c0392b; padding: 10px 14px; font-size: 12px; margin-bottom: 15px; font-weight: bold; text-align: center; position: relative; z-index: 1; }
  .doc-section-title { color: #c0392b; font-weight: bold; font-size: 13px; margin: 15px 0 8px; position: relative; z-index: 1; }
  .doc-list { list-style: none; font-size: 12px; line-height: 2; position: relative; z-index: 1; }
  .doc-list li::before { content: '✓ '; color: #c0392b; font-weight: bold; }
  .client-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; font-size: 13px; position: relative; z-index: 1; }
  .section-label { font-size: 11px; text-transform: uppercase; color: #999; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 6px; }
  .bank-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; position: relative; z-index: 1; }
  .bank-card { background: #fdf5f5; border: 1px solid #e0c0c0; padding: 10px; font-size: 11px; line-height: 1.8; border-radius: 4px; }
  .bank-card strong { color: #c0392b; display: block; margin-bottom: 4px; font-size: 12px; }
  .bank-iban { font-size: 11px; font-weight: bold; color: #222; }

  /* CSS Watermark Overlay */
  .watermark-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 0; overflow: hidden; }
  .watermark-text { font-family: Arial, sans-serif; font-size: 50px; font-weight: 900; color: rgba(192, 57, 43, 0.04); text-transform: uppercase; transform: rotate(-35deg); white-space: nowrap; letter-spacing: 5px; }

  @media print {
    body { background: white; }
    .app-header, .form-panel, .preview-toolbar, .page-break-divider { display: none !important; }
    .container { display: block; }
    .preview-panel { padding: 0; background: white; }
    .quotation-page { box-shadow: none; width: 100%; height: auto; min-height: 1050px; padding: 0; margin-bottom: 0; page-break-after: always; }
    .quotation-page:last-of-type { page-break-after: avoid; }
  }
  .page-break-divider { text-align:center; color:#888; font-size:11px; font-weight: bold; padding: 10px 0; letter-spacing:2px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <h1>🏢 Ahmad Aluminium & Glass Cont</h1>
    <span>#1 Aluminium & Glass Cont UAE — Quotation Generator</span>
  </div>
</div>

<div class="container">
  <!-- FORM PANEL -->
  <div class="form-panel">
    
    <!-- CLOUD SYNC CONTROLS -->
    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; border: 1px solid #1a4a80; margin-bottom: 20px;">
      <label style="color: #4ecca3; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px;">☁️ Cloud Database</label>
      <input type="text" id="dbUrl" placeholder="Paste your Google Web App URL here" style="margin-bottom: 8px; font-size: 11px;">
      <div style="display: flex; gap: 8px;">
        <button onclick="saveToCloud()" style="flex: 1; background: #2ecc71; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;">💾 Save / Update</button>
        <button onclick="loadFromCloud()" style="flex: 1; background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;">📂 Load Quote</button>
      </div>
    </div>

    <h2>📋 Quotation Details</h2>

    <div class="form-group">
      <label>Quotation Number</label>
      <input type="text" id="quotRef" placeholder="AA-2026-203">
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="quotDate">
    </div>
    <div class="form-group">
      <label>Client Address</label>
      <input type="text" id="clientAddr" placeholder="Al Sufouh, Dubai - UAE">
    </div>
    <div class="form-group">
      <label>Client Phone</label>
      <input type="text" id="clientPhone" placeholder="NA">
    </div>
    <div class="form-group">
      <label>Client Email</label>
      <input type="text" id="clientEmail" placeholder="NA">
    </div>
    <div class="form-group">
      <label>Subject / Work Type</label>
      <input type="text" id="subject" placeholder="Supply & Installation of Glass Room Work">
    </div>

    <h2 style="margin-top:20px;">🔧 Line Items</h2>
    <button class="btn-glass-room" onclick="loadGlassRoomItems()">🏠 Load All Glass Room Items</button>
    <div class="items-section" id="itemsContainer"></div>
    <button class="btn-add" onclick="addItem()">+ Add Custom Item</button>

    <button class="btn-generate" onclick="generateQuotation()">⚡ Generate Quotation</button>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <button class="btn-pdf" onclick="downloadPDF()">📄 Download / Print PDF</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="quotation-container" id="quotationDoc">
      <div style="text-align:center; color:#999; padding:80px 0; font-size:16px;">
        Fill the form and click <strong style="color:#e74c3c">Generate Quotation</strong>
      </div>
    </div>
  </div>
</div>

<script>

// ─── ITEM LIBRARY ───────────────────────────────────────────────────────────
const ITEM_LIBRARY = {
  'Structure': 'Supply & installation of Juton powder coated 100mm × 100mm, 2mm thick aluminium tube frame for roof and pillars.',
  'Swing Door': 'Supply & installation of Juton powder coated 4.5cm aluminium frame swing door with double glass (6mm tempered clear + 12mm air spacer + 6mm tempered clear glass).',
  '3 Side Closing with Cement Board & Gypsum': 'Supply & installation of outside cement board, inside gypsum board with GI channel, wall construction and white paint finishing.',
  'Sandwich Panel Roof': 'Supply & installation of 9cm thick sandwich panel roof with sheets on both sides and insulation foam inside, 10cm slope for drainage, 100% waterproofing.',
  'Gypsum Ceiling': 'Supply & installation of GI channel frame for gypsum board ceiling with white paint finishing.',
  'Electric': 'Supply & installation of spot lights in gypsum board ceiling and power sockets as required.',
  'AC': 'Supply & installation of 1.5 Ton Samsung or Super General AC with up to 3m copper pipe connection and power supply installation.',
};

const GLASS_ROOM_ITEMS = [
  'Structure',
  'Swing Door',
  '3 Side Closing with Cement Board & Gypsum',
  'Sandwich Panel Roof',
  'Gypsum Ceiling',
  'Electric',
  'AC',
];

document.getElementById('quotDate').valueAsDate = new Date();

// Load or initialize Quotation Auto-number
let nextQuotNum = localStorage.getItem('nextQuotNum');
if (!nextQuotNum) {
  nextQuotNum = 203;
  localStorage.setItem('nextQuotNum', nextQuotNum);
}
document.getElementById('quotRef').value = "AA-2026-" + nextQuotNum;

// Persistent Database URL loader
const savedUrl = localStorage.getItem('dbUrl');
if (savedUrl) {
  document.getElementById('dbUrl').value = savedUrl;
}
document.getElementById('dbUrl').addEventListener('input', (e) => {
  localStorage.setItem('dbUrl', e.target.value.trim());
});

let itemCount = 0;

// ─── LOAD GLASS ROOM PRESET ─────────────────────────────────────────────────
function loadGlassRoomItems() {
  if (document.querySelectorAll('.item-row').length > 0) {
    if (!confirm('This will replace existing items with Glass Room items. Continue?')) return;
    document.getElementById('itemsContainer').innerHTML = '';
    itemCount = 0;
  }
  GLASS_ROOM_ITEMS.forEach(name => addItem(name, ITEM_LIBRARY[name]));
  document.getElementById('subject').value = 'Supply & Installation of Glass Room Work';
}

// ─── ADD ITEM ────────────────────────────────────────────────────────────────
function addItem(prefillName = '', prefillDesc = '') {
  itemCount++;
  const id = itemCount;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = 'item_' + id;

  const options = ['-- Select Item --', ...Object.keys(ITEM_LIBRARY), 'Custom'];
  const optionsHTML = options.map(o => `<option value="${o}"${o === prefillName ? ' selected' : ''}>${o}</option>`).join('');

  div.innerHTML = `
    <h4>Item #${id}</h4>
    <button class="btn-remove" onclick="removeItem(${id})">✕</button>
    <div class="item-grid">
      <div class="full">
        <label>Quick Select (auto-fills name & description)</label>
        <select onchange="onNameSelect(${id}, this.value)">
          ${optionsHTML}
        </select>
      </div>
      <div class="full">
        <label>Item Name (editable)</label>
        <input type="text" id="name_${id}" value="${prefillName}" placeholder="e.g. Structure, Swing Door..." style="font-weight:bold;">
      </div>
      <div class="full">
        <label>Description</label>
        <textarea id="desc_${id}" rows="2" style="width:100%;background:#16213e;border:1px solid #1a4a80;color:#eee;padding:6px 8px;border-radius:4px;font-size:11px;resize:vertical;" placeholder="Supply & Installation of...">${prefillDesc}</textarea>
      </div>
      
      <div class="full sizes-container">
        <div class="sizes-title">📐 Sizes (Multiple Dimension sets)</div>
        <div class="size-row">
          <span>#1</span>
          <input type="number" id="w1_${id}" placeholder="W (cm)" oninput="calcArea(${id})">
          <span>×</span>
          <input type="number" id="h1_${id}" placeholder="H (cm)" oninput="calcArea(${id})">
          <span>Qty</span>
          <input type="number" id="qty1_${id}" value="1" oninput="calcArea(${id})">
        </div>
        <div class="size-row">
          <span>#2</span>
          <input type="number" id="w2_${id}" placeholder="W (cm)" oninput="calcArea(${id})">
          <span>×</span>
          <input type="number" id="h2_${id}" placeholder="H (cm)" oninput="calcArea(${id})">
          <span>Qty</span>
          <input type="number" id="qty2_${id}" oninput="calcArea(${id})">
        </div>
        <div class="size-row">
          <span>#3</span>
          <input type="number" id="w3_${id}" placeholder="W (cm)" oninput="calcArea(${id})">
          <span>×</span>
          <input type="number" id="h3_${id}" placeholder="H (cm)" oninput="calcArea(${id})">
          <span>Qty</span>
          <input type="number" id="qty3_${id}" oninput="calcArea(${id})">
        </div>
      </div>

      <div class="full" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div>
          <label>Price per m²</label>
          <input type="number" id="price_${id}" placeholder="e.g. 1500" oninput="calcArea(${id})">
        </div>
        <div>
          <label>OR Fixed Price (AED)</label>
          <input type="number" id="fixed_${id}" placeholder="e.g. 15000" oninput="calcArea(${id})">
        </div>
      </div>
    </div>
    <div class="calc-result" id="calc_${id}" data-amount="0">Enter dimensions or fixed price</div>
  `;
  document.getElementById('itemsContainer').appendChild(div);
}

function onNameSelect(id, value) {
  if (value && ITEM_LIBRARY[value]) {
    document.getElementById('name_' + id).value = value;
    document.getElementById('desc_' + id).value = ITEM_LIBRARY[value];
  } else if (value === 'Custom') {
    document.getElementById('name_' + id).value = '';
    document.getElementById('desc_' + id).value = '';
    document.getElementById('name_' + id).focus();
  }
}

function calcArea(id) {
  let totalRawArea = 0;
  let totalQty = 0;
  let sizeStrings = [];

  for (let s = 1; s <= 3; s++) {
    const w = parseFloat(document.getElementById(`w${s}_${id}`).value) || 0;
    const h = parseFloat(document.getElementById(`h${s}_${id}`).value) || 0;
    const qty = parseFloat(document.getElementById(`qty${s}_${id}`).value) || (s === 1 ? 1 : 0);

    if (w > 0 && h > 0 && qty > 0) {
      const rawArea = (w / 100) * (h / 100) * qty;
      totalRawArea += rawArea;
      totalQty += qty;
      sizeStrings.push(`${w}×${h}cm (${qty})`);
    }
  }

  const pricePerM2 = parseFloat(document.getElementById('price_' + id).value) || 0;
  const fixedPrice = parseFloat(document.getElementById('fixed_' + id).value) || 0;

  let amount = 0;
  let calcText = '';

  if (fixedPrice > 0) {
    const activeQty = totalQty > 0 ? totalQty : 1;
    amount = fixedPrice * activeQty;
    calcText = `Fixed Price: AED ${fixedPrice.toFixed(2)} × Qty ${activeQty} = AED ${amount.toFixed(2)}`;
  } else if (totalRawArea > 0 && pricePerM2 > 0) {
    const roundedArea = Math.ceil(totalRawArea * 2) / 2;
    amount = roundedArea * pricePerM2;
    calcText = `Total Area: ${totalRawArea.toFixed(4)}m² → Rounded: ${roundedArea.toFixed(1)}m² × AED ${pricePerM2}/m² = AED ${amount.toFixed(2)}`;
  } else if (totalRawArea > 0) {
    calcText = `Total Area: ${totalRawArea.toFixed(4)}m² | Enter price to calculate`;
  } else {
    calcText = 'Enter dimensions or fixed price';
  }

  const el = document.getElementById('calc_' + id);
  el.textContent = calcText;
  el.dataset.amount = amount;
  el.dataset.sizeText = sizeStrings.join(' | ');
  el.dataset.roundedArea = totalRawArea > 0 ? (Math.ceil(totalRawArea * 2) / 2).toFixed(1) : '';
}

function removeItem(id) {
  document.getElementById('item_' + id).remove();
}

function getItems() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const nameEl = document.getElementById('name_' + id);
    const selectedName = nameEl ? nameEl.value : '';
    let itemName = (selectedName && selectedName !== '-- Select Item --' && selectedName !== 'Custom') ? selectedName : '';
    const calcEl = document.getElementById('calc_' + id);
    const amount = parseFloat(calcEl.dataset.amount) || 0;
    const size = calcEl.dataset.sizeText || '-';
    const roundedArea = calcEl.dataset.roundedArea || '';
    const desc = document.getElementById('desc_' + id).value;
    items.push({ itemName, desc, size, qty: 1, amount, roundedArea });
  });
  return items;
}

// ─── CLOUD DATA SERIALIZER ──────────────────────────────────────────────────
function serializeItems() {
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const name = document.getElementById('name_' + id).value;
    const desc = document.getElementById('desc_' + id).value;
    const price = document.getElementById('price_' + id).value;
    const fixed = document.getElementById('fixed_' + id).value;
    const sizes = [];
    for (let s = 1; s <= 3; s++) {
      sizes.push({
        w: document.getElementById(`w${s}_${id}`).value,
        h: document.getElementById(`h${s}_${id}`).value,
        qty: document.getElementById(`qty${s}_${id}`).value
      });
    }
    items.push({ name, desc, price, fixed, sizes });
  });
  return items;
}

function deserializeItems(itemsData) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  itemsData.forEach(item => {
    addItem(item.name, item.desc);
    const id = itemCount;
    document.getElementById('price_' + id).value = item.price || '';
    document.getElementById('fixed_' + id).value = item.fixed || '';
    if (item.sizes) {
      item.sizes.forEach((sz, idx) => {
        const s = idx + 1;
        document.getElementById(`w${s}_${id}`).value = sz.w || '';
        document.getElementById(`h${s}_${id}`).value = sz.h || '';
        document.getElementById(`qty${s}_${id}`).value = sz.qty || '';
      });
    }
    calcArea(id);
  });
}

function saveToCloud() {
  const url = document.getElementById('dbUrl').value.trim();
  if (!url) { alert('Please paste your Google Web App URL first!'); return; }
  
  const ref = document.getElementById('quotRef').value.trim();
  const date = document.getElementById('quotDate').value;
  const clientAddr = document.getElementById('clientAddr').value;
  const clientPhone = document.getElementById('clientPhone').value;
  const clientEmail = document.getElementById('clientEmail').value;
  const subject = document.getElementById('subject').value;
  const items = serializeItems();

  const data = { ref, date, clientAddr, clientPhone, clientEmail, subject, items };

  fetch(url, {
    redirect: "follow",
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  })
  .then(res => res.json())
  .then(response => {
    alert(`Quotation ${response.ref} successfully saved / updated in your Google Sheet!`);
  })
  .catch(err => {
    console.error(err);
    alert('Error saving to cloud. Please make sure your Web App is deployed as "Anyone" and the URL is correct.');
  });
}

function loadFromCloud() {
  const url = document.getElementById('dbUrl').value.trim();
  if (!url) { alert('Please paste your Google Web App URL first!'); return; }
  
  const targetRef = document.getElementById('quotRef').value.trim();
  if (!targetRef) { alert('Please enter a Quotation Number to load.'); return; }

  fetch(url)
  .then(res => res.json())
  .then(quotes => {
    const found = quotes.find(q => q.ref.toLowerCase() === targetRef.toLowerCase());
    if (found) {
      document.getElementById('quotDate').value = found.date;
      document.getElementById('clientAddr').value = found.clientAddr;
      document.getElementById('clientPhone').value = found.clientPhone;
      document.getElementById('clientEmail').value = found.clientEmail;
      document.getElementById('subject').value = found.subject;
      
      const itemsData = JSON.parse(found.itemsJson);
      deserializeItems(itemsData);
      
      alert(`Quotation ${targetRef} loaded successfully! Click "Generate Quotation" to update the preview.`);
    } else {
      alert(`Quotation "${targetRef}" not found in your database.`);
    }
  })
  .catch(err => {
    console.error(err);
    alert('Error loading from cloud. Please check your internet connection or URL.');
  });
}

// ─── NUMBER TO WORDS ─────────────────────────────────────────────────────────
function numberToWords(num) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  if (num === 0) return 'Zero';
  function helper(n) {
    if (n < 20) return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
    if (n < 1000) return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + helper(n%100) : '');
    if (n < 100000) return helper(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + helper(n%1000) : '');
    return helper(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ' ' + helper(n%100000) : '');
  }
  const intPart = Math.floor(num);
  const decPart = Math.round((num - intPart) * 100);
  let result = helper(intPart) + ' UAE Dirhams';
  if (decPart > 0) result += ' and ' + helper(decPart) + ' Fils';
  return result + ' Only';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const day = String(d.getDate()).padStart(2,'0');
  const month = d.toLocaleString('en-GB', {month: 'long'});
  const year = d.getFullYear();
  return `${day}, ${month}, ${year}.`;
}

function downloadPDF() {
  const s = document.createElement('style');
  s.textContent = '@media print { body{background:white!important;} .app-header,.form-panel,.preview-toolbar{display:none!important;} .container{display:block!important;} .preview-panel{padding:0!important;background:white!important;} .quotation-page{box-shadow:none!important;width:100%!important;} .page-break-divider{display:none!important;} }';
  document.head.appendChild(s);
  window.print();
  setTimeout(() => document.head.removeChild(s), 1000);
}
