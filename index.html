<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ahmad Aluminium & Glass - Quotation System</title>
<!-- html2pdf.js CDN library for programmatic high-fidelity PDF exports -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  
  /* Modern Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f8fafc; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background: #f1f5f9; 
    color: #334155; 
    min-height: 100vh; 
    -webkit-font-smoothing: antialiased; 
    overflow-x: hidden;
  }

  /* Header Box */
  .app-header { 
    background: #ffffff; 
    padding: 14px 24px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    border-bottom: 1px solid #e2e8f0; 
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 1001;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-box {
    background: #fff5f5;
    border: 1px solid #fee2e2;
    border-radius: 8px;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
  }
  .brand-info h1 { font-size: 16px; color: #0f172a; font-weight: 700; margin-bottom: 2px; }
  .brand-info span { font-size: 11px; color: #64748b; font-weight: 500; }

  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  
  .btn-folder-header {
    background: #991b1b;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 700;
  }

  /* Sync Badge */
  .sync-badge {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 9999px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    color: #166534;
  }
  .sync-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

  /* Grid Layout */
  .container { display: grid; grid-template-columns: 420px 1fr; height: calc(100vh - 73px); }

  /* Mobile Tabs */
  .mobile-tabs {
    display: none;
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .mobile-tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 14px;
    font-size: 13px;
    font-weight: 700;
    color: #64748b;
    border-bottom: 3px solid transparent;
  }
  .mobile-tab-btn.active { color: #991b1b; border-bottom-color: #991b1b; background: #fffdfd; }

  /* Panels */
  .form-panel { background: #ffffff; padding: 24px; overflow-y: auto; border-right: 1px solid #e2e8f0; }
  .preview-panel { 
    background: #475569; 
    overflow: auto; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 40px 20px; 
  }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 10px; color: #475569; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea { 
    width: 100%; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; font-size: 14px; 
  }

  .item-row { 
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 16px; position: relative; 
  }
  .btn-remove { position: absolute; top: 12px; right: 12px; background: #fee2e2; color: #ef4444; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }

  .btn-generate { 
    width: 100%; background: #991b1b; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px;
  }

  /* Preview Toolbar */
  .preview-toolbar { width: 100%; max-width: 210mm; display: flex; gap: 12px; margin-bottom: 20px; justify-content: center; }
  .btn-pdf { background: #991b1b; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 700; }
  .btn-print { background: #1e293b; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 700; }

  /* PHYSICAL A4 DOCUMENT STYLING */
  .quotation-container { width: 210mm; }
  .quotation-page { 
    background: white; width: 210mm; min-height: 297mm; padding: 20mm; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; 
  }
  .quotation-page-footer { 
    background: white; width: 210mm; min-height: 297mm; padding: 15mm 20mm; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); page-break-before: always; 
  }

  table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12px; }
  th { background: #991b1b; color: white; padding: 10px; text-align: left; }
  td { border: 1px solid #e2e8f0; padding: 10px; vertical-align: top; }
  .total-row { font-weight: bold; background: #f8fafc; color: #991b1b; }

  /* Bank Cards */
  .bank-card { 
    background: #fff5f5; border: 1px solid #fee2e2; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #991b1b;
    display: flex; justify-content: space-between; align-items: center;
  }
  .iban-pill { background: white; border: 1px solid #cbd5e1; padding: 6px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }

  /* Watermark */
  .watermark-container { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; pointer-events:none; z-index:0; }
  .watermark-text { font-size: 60px; font-weight: 900; color: rgba(153, 27, 27, 0.03); transform: rotate(-45deg); white-space: nowrap; }

  /* MOBILE RESPONSIVENESS - FIXING THE HALF SCREEN ISSUE */
  @media (max-width: 992px) {
    .container { display: block; height: auto; }
    .form-panel, .preview-panel { display: none; width: 100%; }
    .form-panel.active { display: block; }
    .preview-panel.active { display: flex; }
    .mobile-tabs { display: flex; }
    
    .app-header { padding: 10px; }
    .header-right { display: none; } /* Hide extra info on mobile header to save space */

    /* THE FIX: Scale the A4 Preview to fit the mobile screen width */
    .preview-panel { padding: 20px 0; background: #334155; }
    .quotation-container { 
      transform: scale(0.43); /* Scales down the 210mm width to fit ~375px mobile screens */
      transform-origin: top center; 
      margin-top: -200px; /* Pulls up the scaled content */
      margin-bottom: -500px;
    }
    
    .preview-toolbar { 
      position: fixed; bottom: 20px; z-index: 2000; width: 90%; max-width: none; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .preview-toolbar button { flex: 1; border-radius: 40px; }
  }

  @media print {
    .app-header, .form-panel, .preview-toolbar, .mobile-tabs { display: none !important; }
    .preview-panel { padding: 0 !important; background: white !important; }
    .quotation-container { transform: scale(1) !important; margin: 0 !important; }
    .quotation-page, .quotation-page-footer { box-shadow: none !important; margin: 0 !important; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <div class="header-left">
    <div class="logo-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2.5"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="9" y1="22" x2="9" y2="16"/><line x1="15" y1="22" x2="15" y2="16"/><path d="M9 6h.01M15 6h.01M9 10h.01M15 10h.01"/></svg>
    </div>
    <div class="brand-info">
      <h1>Ahmad Aluminium & Glass</h1>
      <span>Official Quotation Studio</span>
    </div>
  </div>
  <div class="header-right">
    <button onclick="selectAutoSaveFolder()" class="btn-folder-header">📂 Set Save Folder</button>
    <div class="sync-badge"><span class="sync-dot"></span><span id="syncStatus">CONNECTED</span></div>
  </div>
</div>

<!-- Mobile Tab Nav -->
<div class="mobile-tabs">
  <button class="mobile-tab-btn active" id="tab-edit" onclick="switchMobileTab('form')">📝 Edit Details</button>
  <button class="mobile-tab-btn" id="tab-preview" onclick="switchMobileTab('preview')">👁️ View Preview</button>
</div>

<div class="container">
  <!-- Sidebar Form -->
  <div class="form-panel active" id="formPanel">
    <div class="form-group">
        <label>Reference Number</label>
        <input type="text" id="quotRef" placeholder="AA-2026-215">
    </div>
    <div class="form-group"><label>Date</label><input type="date" id="quotDate"></div>
    <div class="form-group"><label>Client Address</label><input type="text" id="clientAddr" placeholder="Dubai, UAE"></div>
    <div class="form-group"><label>Client Phone</label><input type="text" id="clientPhone" placeholder="+971 58 849 0784"></div>
    <div class="form-group"><label>Subject</label><input type="text" id="subject" placeholder="Glass Room Work"></div>
    
    <div class="form-group" style="background: #f0fdf4; padding: 12px; border-radius: 8px;">
      <label>📐 Room Dimensions (cm)</label>
      <div style="display: flex; gap: 5px;">
        <input type="number" id="globalWidth" placeholder="W">
        <input type="number" id="globalLength" placeholder="L">
        <input type="number" id="globalHeight" placeholder="H">
      </div>
    </div>

    <div id="itemsContainer"></div>
    <button style="width:100%; padding:10px; border:1px dashed #94a3b8; background:none; cursor:pointer; border-radius:6px; margin-bottom:10px;" onclick="addItem()">+ Add Item</button>
    
    <button class="btn-generate" onclick="generateQuotation(); triggerSilentCloudSave();">⚡ Update Preview</button>
  </div>

  <!-- Document Preview -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-toolbar">
      <button class="btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    </div>
    <div class="quotation-container" id="quotationDoc">
        <div style="color:white; text-align:center; padding-top:100px;">Click "Update Preview" to load document...</div>
    </div>
  </div>
</div>

<script>
const DB_URL = "https://script.google.com/macros/s/AKfycbz7vTFZevifbAMfMHH7XxG7cI3Zgv_uCnLgK1DKfdhCQ3LF__JC4HIH8wvTH5BKhL59Uw/exec";
let itemCount = 0;

function switchMobileTab(tab) {
  document.getElementById('formPanel').classList.remove('active');
  document.getElementById('previewPanel').classList.remove('active');
  document.getElementById('tab-edit').classList.remove('active');
  document.getElementById('tab-preview').classList.remove('active');

  if (tab === 'form') {
    document.getElementById('formPanel').classList.add('active');
    document.getElementById('tab-edit').classList.add('active');
  } else {
    document.getElementById('previewPanel').classList.add('active');
    document.getElementById('tab-preview').classList.add('active');
    generateQuotation();
  }
}

function addItem(name='', desc='', rate='') {
  itemCount++;
  const id = itemCount;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = `item_${id}`;
  div.innerHTML = `
    <button class="btn-remove" onclick="document.getElementById('item_${id}').remove()">✕</button>
    <div class="form-group"><label>Item Name</label><input type="text" id="name_${id}" value="${name}"></div>
    <div class="form-group"><label>Description</label><textarea id="desc_${id}">${desc}</textarea></div>
    <div class="form-group"><label>Amount (AED)</label><input type="number" id="rate_${id}" value="${rate}"></div>
  `;
  document.getElementById('itemsContainer').appendChild(div);
}

function generateQuotation() {
  const ref = document.getElementById('quotRef').value || 'REF-001';
  const date = document.getElementById('quotDate').value;
  const addr = document.getElementById('clientAddr').value || 'Dubai, UAE';
  const subject = document.getElementById('subject').value;
  
  let rows = '';
  let total = 0;
  document.querySelectorAll('.item-row').forEach((row, i) => {
    const id = row.id.split('_')[1];
    const n = document.getElementById(`name_${id}`).value;
    const d = document.getElementById(`desc_${id}`).value;
    const r = parseFloat(document.getElementById(`rate_${id}`).value) || 0;
    total += r;
    rows += `<tr><td>${i+1}</td><td><strong>${n}</strong><br><small>${d}</small></td><td style="text-align:right">${r.toLocaleString()}</td></tr>`;
  });

  const waterMark = `<div class="watermark-container"><div class="watermark-text">AHMAD ALUMINIUM</div></div>`;

  const page1 = `
    <div class="quotation-page">
      ${waterMark}
      <div style="display:flex; justify-content:space-between; border-bottom:3px solid #991b1b; padding-bottom:10px;">
        <h2 style="color:#991b1b">AHMAD ALUMINIUM & GLASS</h2>
        <h1 style="color:#991b1b; font-size:30px;">QUOTATION</h1>
      </div>
      <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:20px; font-size:13px;">
        <div><strong>To:</strong> ${addr}<br><strong>Phone:</strong> ${document.getElementById('clientPhone').value}</div>
        <div style="text-align:right;"><strong>Ref:</strong> ${ref}<br><strong>Date:</strong> ${date}</div>
      </div>
      <div style="margin:20px 0; padding:10px; background:#fef2f2; text-align:center; font-weight:bold; color:#991b1b; border:1px solid #fca5a5;">Subject: ${subject}</div>
      <table>
        <thead><tr><th>Sr.</th><th>Description</th><th style="text-align:right">Amount (AED)</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="total-row"><td colspan="2" style="text-align:right">Grand Total</td><td style="text-align:right">${total.toLocaleString()} AED</td></tr></tfoot>
      </table>
      <div style="font-size:11px; margin-top:10px; color:#64748b; text-align:center;">*** Amount in Words: Only ${total.toLocaleString()} UAE Dirhams ***</div>
    </div>
  `;

  const page2 = `
    <div class="quotation-page-footer">
      ${waterMark}
      <h4 style="color:#991b1b; border-bottom:1px solid #e2e8f0; padding-bottom:5px;">TERMS & CONDITIONS</h4>
      <ul style="font-size:11px; line-height:1.8; color:#475569; margin-top:10px;">
        <li>Payment: 60% Advance, 40% on Completion.</li>
        <li>Validity: This offer is valid for 7 days.</li>
        <li>Power and water supply to be provided by the client.</li>
      </ul>
      <div style="margin-top:30px;">
        <h4 style="color:#991b1b;">BANK DETAILS</h4>
        <div class="bank-card">
          <div><strong>Mashreq Bank</strong><br><small>Ahmad Aluminium & Glass Contractor LLC FZ</small></div>
          <div class="iban-pill">AE36 0330 0000 1910 2134 817</div>
        </div>
        <div class="bank-card">
          <div><strong>Emirates NBD</strong><br><small>Ahmad Latif</small></div>
          <div class="iban-pill">AE28 0260 0010 1580 3625 901</div>
        </div>
      </div>
      <div style="margin-top:50px; display:flex; justify-content:space-between; align-items:flex-end;">
        <div style="font-size:12px;"><strong>Ahmad Latif</strong><br>Project Manager</div>
        <div style="border-top:1px solid #334155; width:150px; text-align:center; font-size:11px;">Authorized Signature</div>
      </div>
    </div>
  `;

  document.getElementById('quotationDoc').innerHTML = page1 + page2;
}

function downloadPDF() {
  const ref = document.getElementById('quotRef').value || 'AA-215';
  const element = document.getElementById('quotationDoc');
  const opt = {
    margin: 0,
    filename: `${ref}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save();
}

function triggerSilentCloudSave() {
    // Basic silent save to your Google Sheet logic
    const data = { ref: document.getElementById('quotRef').value, date: document.getElementById('quotDate').value };
    fetch(DB_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
}

window.onload = () => {
  document.getElementById('quotDate').valueAsDate = new Date();
  addItem('Glass Partition', 'Supply and Installation of 12mm clear tempered glass', '2500');
};
</script>
</body>
</html>
